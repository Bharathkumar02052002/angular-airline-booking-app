<section class="lookup-layout">
  <article class="surface-card lookup-panel">
    <p class="eyebrow">Manage booking</p>
    <h1 class="section-title">Find your trip by PNR</h1>
    <p class="section-copy">
      Enter a PNR and the passenger's last name to open the booking summary.
    </p>

    <form [formGroup]="form" (ngSubmit)="lookup()" class="field-grid">
      <div class="field">
        <label>PNR</label>
        <input type="text" formControlName="pnr" placeholder="SB6Q2P">
      </div>

      <div class="field">
        <label>Last name</label>
        <input type="text" formControlName="lastName" placeholder="Raman">
      </div>

      <button type="submit" class="button-primary">Find booking</button>
    </form>
  </article>

  <article class="surface-card helper-panel">
    <p class="eyebrow">Sample data</p>
    <h2 class="section-title">Use the seeded booking</h2>
    <p class="section-copy">PNR: SB6Q2P | Last name: Raman. You can also create a new booking from the home page.</p>
    <a class="button-secondary" routerLink="/">Create a new booking</a>
  </article>
</section>
